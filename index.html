<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Husnify PK</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #fbeaff, #e0f7ff);
    color: #333;
    text-align: center;
}

/* Header */
header {
    padding: 60px 20px;
}

h1 {
    font-size: 40px;
    margin-bottom: 10px;
    color: #444;
}

p {
    font-size: 18px;
    color: #666;
}

/* Button */
.btn {
    display: inline-block;
    margin-top: 20px;
    padding: 12px 25px;
    background: #ff4da6;
    color: white;
    text-decoration: none;
    border-radius: 25px;
    transition: 0.3s;
}

.btn:hover {
    background: #e60073;
    transform: scale(1.05);
}

/* Products */
.products {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 15px;
    padding: 20px;
}

.card {
    background: white;
    padding: 15px;
    border-radius: 15px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

.card img {
    width: 100%;
    border-radius: 10px;
}
</style>

</head>

<body>

<header>
    <h1>Husnify PK ✨</h1>
    <p>Elegant Jewelry & Fashion Store</p>
    <a class="btn" href="https://wa.me/923000000000" target="_blank">
        Order on WhatsApp
    </a>
</header>

<section class="products">

    <div class="card">
        <img src="https://images.unsplash.com/photo-1601121141461-9d6647bca1ed" />
        <p>Gold Ring</p>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1617038260897-41a1f14a8ca0" />
        <p>Elegant Necklace</p>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1600180758890-6b94519a8ba6" />
        <p>Luxury Bracelet</p>
    </div>

</section>

</body>
</html>
